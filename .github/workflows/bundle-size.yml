name: Bundle size

on:
  pull_request:
    branches: ['master', 'dev']
  workflow_dispatch:

concurrency:
  group: bundle-size-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Build bundle analyzer report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      SENTRY_SKIP_UPLOAD: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        name: Setup pnpm
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-bundle-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-bundle-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with analyzer
        run: pnpm run build:analyze

      - name: Upload analyze report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: next-analyze
          path: .next/analyze/
          if-no-files-found: warn
          retention-days: 14
